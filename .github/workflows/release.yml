name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release-cli:
    name: Build CLI binaries (goreleaser)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          workdir: cli
          args: release --clean
        env:
          # TAP_GITHUB_TOKEN is a PAT (or GitHub App installation token) with
          # `contents: write` on this repo plus dev-creations/homebrew-qilin and
          # dev-creations/scoop-qilin. GoReleaser uses it to create the GitHub
          # release here and to commit the formula/manifest to the tap repos.
          GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  release-image:
    name: Build & push qilin-mcp image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        # The git tag uses a `v` prefix by convention (`v1.2.3`), but every
        # other version surface in this project is PEP 440 / no-prefix:
        #   - GoReleaser injects `{{.Version}}` (stripped of `v`) into the CLI
        #     binary, so `version.ImageTag()` returns `1.2.3`.
        #   - setuptools-scm requires PEP 440, so `qilin.__version__` is also
        #     `1.2.3`.
        # We tag the image with the same PEP 440 form so the CLI's compose
        # file lines up with what's actually published on GHCR.
        run: echo "pep440=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/dev-creations/qilin-mcp:${{ steps.tag.outputs.pep440 }}
            ghcr.io/dev-creations/qilin-mcp:latest
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_QILIN=${{ steps.tag.outputs.pep440 }}
          provenance: true
          sbom: true
