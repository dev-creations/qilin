# GoReleaser config for the qilin CLI binary.
#
#   cd cli && goreleaser release --snapshot --clean        # local dry-run
#
# Release is driven by .github/workflows/release.yml; tag `v*` from the repo
# root, and the workflow runs `goreleaser release` from this directory.

version: 2

project_name: qilin

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: qilin
    main: ./cmd/qilin
    binary: qilin
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 isn't widely used yet; skip until there's demand.
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/dev-creations/qilin/cli/internal/version.Version={{.Version}}
      - -X github.com/dev-creations/qilin/cli/internal/version.Commit={{.FullCommit}}
      - -X github.com/dev-creations/qilin/cli/internal/version.Date={{.Date}}
    hooks:
      # Cross-compiled-from-Linux Mach-O binaries have no code signature at
      # all. On Apple Silicon the kernel kills any arm64 binary that lacks
      # at least an ad-hoc signature, and Gatekeeper rejects the rest with
      # the "Apple cannot verify..." dialog. We can't fully fix this without
      # an Apple Developer ID + notarization (paid), but we can ad-hoc sign
      # every darwin binary using rcodesign (a Rust reimplementation of
      # Apple's codesign that runs on Linux). The wrapper script no-ops for
      # non-darwin targets so the hook is safe across the whole matrix.
      #
      # rcodesign is installed by the release workflow before goreleaser
      # runs; for local snapshot builds the script gracefully skips signing
      # if rcodesign isn't on $PATH.
      post:
        - ./scripts/codesign-darwin.sh {{ .Os }} {{ .Path }}

archives:
  - id: qilin
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin
      {{- else if eq .Os "linux" }}linux
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    # LICENSE and README live at the repo root, not under cli/. We surface them
    # via the GitHub release page itself rather than duplicating them into
    # every archive (goreleaser refuses to follow `..` paths).

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot+{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "(?i)^(feat|feature)(\\(.*\\))?:"
      order: 0
    - title: Bug fixes
      regexp: "(?i)^fix(\\(.*\\))?:"
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew Cask tap + Scoop bucket. Both are published on every `v*` tag;
# the release workflow needs a PAT/App token (TAP_GITHUB_TOKEN) with
# `contents: write` on dev-creations/qilin (for the GitHub Release) and on
# dev-creations/homebrew-qilin + dev-creations/scoop-qilin (for the
# formula/manifest commits).
#
# Note: we use `homebrew_casks` rather than `brews` because GoReleaser
# deprecated the latter in v2.16. Linuxbrew now supports Casks too, so this
# is the supported path going forward.
homebrew_casks:
  - name: qilin
    repository:
      owner: dev-creations
      name: homebrew-qilin
      branch: main
    directory: Casks
    homepage: https://github.com/dev-creations/qilin
    description: Plug-and-play vector memory exposed over MCP/SSE.
    license: MIT
    binaries:
      - qilin
    # Strip the `com.apple.quarantine` xattr that LaunchServices stamps onto
    # every downloaded file. Without this, macOS 15+ will pop the
    # "Apple cannot verify that this binary is free of malware..."
    # Gatekeeper dialog the first time the user runs `qilin`, even though
    # brew installed the cask. Combined with the ad-hoc sign we apply in
    # the build hook above, this makes `qilin --version` work cleanly
    # after `brew install --cask qilin`.
    #
    # This is the workaround officially recommended by goreleaser for
    # projects that can't afford an Apple Developer ID + notarization
    # ($99/year). The "proper" fix is to drop this hook and add a
    # `notarize:` block once a Developer ID is available; see
    # https://goreleaser.com/customization/homebrew_casks/#signing-and-notarizing.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
                           args: ["-dr", "com.apple.quarantine", "#{staged_path}/qilin"]
          end

scoops:
  - name: qilin
    repository:
      owner: dev-creations
      name: scoop-qilin
      branch: main
    directory: bucket
    homepage: https://github.com/dev-creations/qilin
    description: Plug-and-play vector memory exposed over MCP/SSE.
    license: MIT

release:
  github:
    owner: dev-creations
    name: qilin
  draft: false
  prerelease: auto
  name_template: "qilin {{ .Tag }}"
