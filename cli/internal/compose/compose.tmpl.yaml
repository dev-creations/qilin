# Auto-generated by `qilin init`. Edit fields via `qilin config set` and re-run
# `qilin init --force` to regenerate; ad-hoc edits here will be overwritten.
name: qilin

services:
{{- if .ManagedQdrant }}
  qdrant:
    image: {{ .QdrantImage }}
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6334"
    ports:
      # Qdrant HTTP API + built-in dashboard. Bound to loopback only so it isn't
      # reachable from the LAN.
      - "127.0.0.1:{{ .QdrantHostPort }}:6333"
    environment:
      QDRANT__SERVICE__HTTP_PORT: "6333"
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - qilin_net
{{- end }}

  qilin-mcp:
    image: {{ .Image }}
    restart: unless-stopped
{{- if .ManagedQdrant }}
    depends_on:
      qdrant:
        condition: service_healthy
{{- end }}
    ports:
      # TLS endpoint
      - "{{ .BindHost }}:{{ .TLSPort }}:{{ .TLSPort }}"
{{- if .HTTPEnabled }}
      # Plain HTTP endpoint bound to loopback only on the host, so it is NOT
      # exposed to the LAN. Convenient for clients that don't trust the
      # self-signed TLS cert (e.g. Cursor on Windows).
      - "127.0.0.1:{{ .HTTPPort }}:{{ .HTTPPort }}"
{{- end }}
    env_file:
      - {{ .EnvFile }}
    volumes:
      - "{{ .HostCertsDir }}:/certs:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - qilin_net

networks:
  qilin_net:
    driver: bridge

{{- if .ManagedQdrant }}

volumes:
  qdrant_data:
    driver: local
{{- end }}
